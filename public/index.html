<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Task Reminder</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Daily Task Reminder</h1>
        <p>Plan your day and never miss important tasks.</p>
        <form id="task-form">
          <div class="grid">
            <label>
              Task title
              <input type="text" id="title" required placeholder="e.g. Morning workout" />
            </label>
            <label>
              Reminder time
              <input type="datetime-local" id="reminder_at" required />
            </label>
            <label>
              Priority
              <select id="priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </label>
          </div>
          <label>
            Notes
            <textarea id="notes" rows="3" placeholder="Optional details..."></textarea>
          </label>
          <button type="submit">Add Task</button>
        </form>
      </section>

      <section class="card">
        <div class="heading-row">
          <h2>Upcoming Tasks</h2>
          <button id="refresh">Refresh</button>
        </div>
        <ul id="task-list" class="task-list"></ul>
      </section>
    </main>

    <template id="task-item-template">
      <li class="task-item">
        <div>
          <h3 class="task-title"></h3>
          <p class="task-meta"></p>
          <p class="task-notes"></p>
        </div>
        <div class="actions">
          <button class="toggle-btn"></button>
          <button class="delete-btn danger">Delete</button>
        </div>
      </li>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
